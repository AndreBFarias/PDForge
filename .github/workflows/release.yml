name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  validate-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Validar formato da tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if ! echo "$TAG" | grep -qP '^v\d+\.\d+\.\d+$'; then
            echo "Formato de tag invalido: $TAG"
            echo "Esperado: vX.Y.Z (ex: v1.2.0)"
            exit 1
          fi
          echo "Tag valida: $TAG"

  test:
    runs-on: ubuntu-latest
    needs: validate-tag
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Instalar dependencias do sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libegl1 libxcb-xinerama0 xvfb

      - name: Instalar dependencias Python
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Testes
        run: QT_QPA_PLATFORM=offscreen pytest tests/ -v --tb=short

  build-deb:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Instalar dependencias
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev rsync

      - name: Construir .deb
        run: bash packaging/build-deb.sh

      - name: Validar .deb
        run: dpkg-deb --info packaging/*.deb

      - name: Upload artefato .deb
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: packaging/*.deb

  build-appimage:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Instalar dependencias
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip python3-venv rsync wget fuse libfuse2

      - name: Construir AppImage
        run: bash packaging/appimage/build-appimage.sh

      - name: Upload artefato AppImage
        uses: actions/upload-artifact@v4
        with:
          name: appimage-package
          path: packaging/appimage/*.AppImage

  build-flatpak:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Instalar dependencias
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder

      - name: Instalar runtime Flatpak
        run: |
          flatpak remote-add --if-not-exists --user flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          flatpak install --noninteractive --user flathub org.freedesktop.Platform//23.08
          flatpak install --noninteractive --user flathub org.freedesktop.Sdk//23.08

      - name: Construir Flatpak
        run: bash packaging/build-flatpak.sh

      - name: Upload artefato Flatpak
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-package
          path: packaging/*.flatpak

  release:
    runs-on: ubuntu-latest
    needs: [build-deb, build-appimage, build-flatpak]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Baixar artefatos
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Gerar changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s" HEAD)
          else
            CHANGELOG=$(git log --pretty=format:"- %s" ${PREV_TAG}..HEAD)
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Criar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## Alteracoes

            ${{ steps.changelog.outputs.changelog }}
          files: |
            dist/deb-package/*.deb
            dist/appimage-package/*.AppImage
            dist/flatpak-package/*.flatpak
          draft: false
          prerelease: false
