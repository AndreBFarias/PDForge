name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar dependencias
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev rsync

      - name: Construir .deb
        run: bash packaging/build-deb.sh

      - name: Upload artefato .deb
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: packaging/*.deb

  build-appimage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar dependencias
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-venv rsync wget fuse libfuse2

      - name: Construir AppImage
        run: bash packaging/appimage/build-appimage.sh

      - name: Upload artefato AppImage
        uses: actions/upload-artifact@v4
        with:
          name: appimage-package
          path: packaging/appimage/*.AppImage

  release:
    runs-on: ubuntu-latest
    needs: [build-deb, build-appimage]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Baixar artefatos
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Gerar changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s" HEAD)
          else
            CHANGELOG=$(git log --pretty=format:"- %s" ${PREV_TAG}..HEAD)
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Criar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## Alteracoes

            ${{ steps.changelog.outputs.changelog }}
          files: |
            dist/deb-package/*.deb
            dist/appimage-package/*.AppImage
          draft: false
          prerelease: false
